<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15190f"/>
      <stop offset="1" stop-color="#0a0c08"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#1fae54"/>
      <stop offset="1" stop-color="#2ee06b"/>
    </linearGradient>
  </defs>

  <!-- dark rounded tile, matching the site surface -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#tile)" stroke="#332e1c" stroke-width="2"/>

  <!-- upward chart line -->
  <polyline points="12,46 24,38 32,42 44,26 53,17"
            fill="none" stroke="url(#line)" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arrowhead pointing up-right -->
  <polyline points="43,15 55,15 55,27"
            fill="none" stroke="#2ee06b" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
